<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Space Grotesk', 'Noto Sans SC', 'sans-serif'],
                    },
                    colors: {
                        cream: '#FDF8F3',
                        'deep-navy': '#1A1A2E',

                        coral: '#E85D75',
                        'mint': '#A8EDEA',
                        'peach': '#FECFEF',

    <style>
        :root {
            --cream: #FDF8F3;
            --deep-navy: #1A1A2E;
            --soft-purple: #4A4A68;
            --coral: #E85D75;
            --mint: #A8EDEA;
            --peach: #FECFEF;
            --bg-primary: #FDF8F3;
            --bg-secondary: #ffffff;
            --text-primary: #1A1A2E;
            --text-secondary: #4A4A68;
            --card-bg: #ffffff;
            --border-color: rgba(26, 26, 46, 0.08);
            --shadow-sm: 0 2px 8px rgba(26, 26, 46, 0.06);
            --shadow-md: 0 4px 16px rgba(26, 26, 46, 0.08);
            --shadow-lg: 0 8px 32px rgba(26, 26, 46, 0.12);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html {
            scroll-behavior: smooth;
        }
        
        body {
            font-family: 'Space Grotesk', 'Noto Sans SC', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }
        
        ::-webkit-scrollbar {
            width: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }
        
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #FF9A9E, #FECFEF);
            border-radius: 3px;
        }
        
        .gradient-text {
            background: linear-gradient(135deg, #FF9A9E 0%, #E85D75 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #FDF8F3 0%, #FECFEF 50%, #A8EDEA 100%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }
        
        #loading-screen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        
        .loading-text {
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FF9A9E 0%, #E85D75 50%, #FF9A9E 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: pulse 2s ease-in-out infinite;
        }
        
        .loading-subtitle {
            font-size: 1.2rem;
            color: #4A4A68;
            margin-top: 1rem;
            letter-spacing: 0.3em;
        }
        
        .loading-bar {
            width: 200px;
            height: 4px;
            background: rgba(255, 154, 158, 0.2);
            border-radius: 2px;
            margin-top: 2rem;
            overflow: hidden;
        }
        
        .loading-progress {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #FF9A9E, #E85D75);
            border-radius: 2px;
            animation: loadingProgress 2s ease-out forwards;
        }
        
        @keyframes loadingProgress {
            0% { width: 0%; }
            100% { width: 100%; }
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(0.98); }
        }
        
        .website-card {
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow-sm);
        }
        
        .website-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }
        
        .category-tag {
            transition: all 0.2s ease;
        }
        
        .category-tag:hover {
            transform: scale(1.05);
        }
        
        .category-tag.active {
            box-shadow: 0 0 0 2px var(--coral);
        }
        
        .search-input:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(232, 93, 117, 0.15);
        }
        
        .issue-btn {
            transition: all 0.2s ease;
        }
        
        .issue-btn:hover {
            background: var(--coral);
            color: white;
        }
        
        .issue-btn.active {
            background: var(--coral);
            color: white;
        }
        
        .fade-in {
            opacity: 0;
            transform: translateY(10px);
            animation: fadeIn 0.4s ease forwards;
        }
        
        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .stagger-1 { animation-delay: 0.05s; }
        .stagger-2 { animation-delay: 0.1s; }
        .stagger-3 { animation-delay: 0.15s; }
        .stagger-4 { animation-delay: 0.2s; }
        .stagger-5 { animation-delay: 0.25s; }
        .stagger-6 { animation-delay: 0.3s; }
        .stagger-7 { animation-delay: 0.35s; }
        .stagger-8 { animation-delay: 0.4s; }
        
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        
        .modal-overlay.show {
            opacity: 1;
            visibility: visible;
        }
        
        .modal-content {
            background: white;
            border-radius: 1.5rem;
            padding: 2rem;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            transform: scale(0.9) translateY(20px);
            transition: all 0.3s ease;
        }
        
        .modal-overlay.show .modal-content {
            transform: scale(1) translateY(0);
        }
        
        .form-input {
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        
        .form-input:focus {
            border-color: #FF9A9E;
            box-shadow: 0 0 0 4px rgba(255, 154, 158, 0.1);
            outline: none;
        }
        
        .logo-preview {
            width: 64px;
            height: 64px;
            border-radius: 12px;
            background: #f3f4f6;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 2px dashed #d1d5db;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .logo-preview:hover {
            border-color: #FF9A9E;
        }
        
        .logo-preview img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        .admin-badge {
            background: linear-gradient(135deg, #FF9A9E 0%, #E85D75 100%);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .edit-btn {
            opacity: 0;
            transition: all 0.2s ease;
        }
        
        .website-card:hover .edit-btn {
            opacity: 1;
        }
        
        @media (max-width: 768px) {
            .website-grid {
                grid-template-columns: 1fr;
            }
        }
        
        @media (min-width: 480px) and (max-width: 767px) {
            .website-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        @media (min-width: 768px) and (max-width: 1023px) {
            .website-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        @media (min-width: 1024px) {
            .website-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        
        @media (min-width: 1280px) {
            .website-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }
    </style>
</head>

    <script>
        const ADMIN_PASSWORD = 'admin123';
        let isAdmin = false;
        
        const state = {
            currentIssue: 'all',
            currentCategory: 'all',
            currentView: 'all',
            searchQuery: '',
            favorites: JSON.parse(localStorage.getItem('favorites') || '[]'),
            websites: [...websites]
        };
        
        function getFaviconUrl(url) {
            try {
                const domain = new URL(url).hostname;
                return `https://www.favicon.ico.org.cn/${domain}`;
            } catch {
                return 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect fill="%23FF9A9E" width="100" height="100" rx="20"/><text x="50" y="65" font-size="50" text-anchor="middle" fill="white">?</text></svg>';
            }
        }
        
        function getCategoryInfo(categoryId) {
            return categories.find(c => c.id === categoryId) || { name: categoryId, color: '#6B7280', icon: 'tag' };
        }
        
        function renderIssueTabs() {
            return;
        }
        
        function renderCategoryTags() {
            const container = document.getElementById('category-tags');
            
            let html = `<button class="category-tag px-4 py-2 rounded-full text-xs font-medium ${state.currentCategory === 'all' ? 'active' : ''}" style="background: white; color: var(--text-secondary); border: 1px solid var(--border-color);" data-category="all">全部</button>`;
            
            categories.forEach(cat => {
                const isActive = state.currentCategory === cat.id;
                html += `<button class="category-tag px-4 py-2 rounded-full text-xs font-medium ${isActive ? 'active' : ''}" style="background: ${isActive ? cat.color : 'white'}; color: ${isActive ? 'white' : cat.color}; border: 1px solid ${cat.color};" data-category="${cat.id}">${cat.name}</button>`;
            });
            
            container.innerHTML = html;
            
            container.querySelectorAll('.category-tag').forEach(btn => {
                btn.addEventListener('click', () => {
                    state.currentCategory = btn.dataset.category;
                    renderCategoryTags();
                    filterAndRenderWebsites();
                });
            });
        }
        
        function filterWebsites() {
            let filtered = [...state.websites];
            
            if (state.currentView === 'favorites') {
                filtered = filtered.filter(w => state.favorites.includes(w.id));
            }
            
            if (state.currentIssue !== 'all') {
                filtered = filtered.filter(w => w.issues.includes(parseInt(state.currentIssue)));
            }
            
            if (state.currentCategory !== 'all') {
                filtered = filtered.filter(w => w.categories.includes(state.currentCategory));
            }
            
            if (state.searchQuery.trim()) {
                const query = state.searchQuery.toLowerCase();
                filtered = filtered.filter(w => 
                    w.name.toLowerCase().includes(query) ||
                    w.summary.toLowerCase().includes(query) ||
                    (w.description && w.description.toLowerCase().includes(query)) ||
                    w.tags.some(t => t.toLowerCase().includes(query)) ||
                    w.categories.some(c => c.toLowerCase().includes(query))
                );
            }
            
            filtered.sort((a, b) => b.priority - a.priority);
            
            return filtered;
        }
        
        function toggleFavorite(websiteId, event) {
            event.preventDefault();
            event.stopPropagation();
            
            const index = state.favorites.indexOf(websiteId);
            if (index > -1) {
                state.favorites.splice(index, 1);
            } else {
                state.favorites.push(websiteId);
            }
            
            localStorage.setItem('favorites', JSON.stringify(state.favorites));
            
            const btn = event.currentTarget;
            const isFavorite = state.favorites.includes(websiteId);
            
            if (isFavorite) {
                btn.innerHTML = '<i data-lucide="heart" class="w-4 h-4 fill-current"></i>';
                btn.classList.add('text-coral');
            } else {
                btn.innerHTML = '<i data-lucide="heart" class="w-4 h-4"></i>';
                btn.classList.remove('text-coral');
            }
            
            lucide.createIcons();
        }
        
        function openEditModal(website = null) {
            const modal = document.getElementById('edit-modal');
            const form = document.getElementById('website-form');
            const title = document.getElementById('modal-title');
            const deleteBtn = document.getElementById('delete-btn');
            
            form.reset();
            document.getElementById('logo-data').value = '';
            document.getElementById('logo-preview').innerHTML = '<i data-lucide="image" class="w-6 h-6 text-gray-400"></i>';
            document.getElementById('logo-remove').classList.add('hidden');
            document.getElementById('website-priority').value = '50';
            
            renderCategoryCheckboxes([]);
            renderIssueCheckboxes([1]);
            
            if (website) {
                title.textContent = '编辑网站';
                deleteBtn.classList.remove('hidden');
                document.getElementById('website-id').value = website.id;
                document.getElementById('website-name').value = website.name;
                document.getElementById('website-url').value = website.url;
                document.getElementById('website-summary').value = website.summary;
                document.getElementById('website-description').value = website.description || '';
                document.getElementById('website-tags').value = website.tags.join(', ');
                document.getElementById('website-priority').value = website.priority;
                
                if (website.favicon && website.favicon.startsWith('data:')) {
                    document.getElementById('logo-data').value = website.favicon;
                    document.getElementById('logo-preview').innerHTML = `<img src="${website.favicon}" alt="Logo">`;
                    document.getElementById('logo-remove').classList.remove('hidden');
                }
                
                renderCategoryCheckboxes(website.categories);
                renderIssueCheckboxes(website.issues);
            } else {
                title.textContent = '添加网站';
                deleteBtn.classList.add('hidden');
            }
            
            modal.classList.add('show');
            lucide.createIcons();
        }
        
        function closeEditModal() {
            const modal = document.getElementById('edit-modal');
            modal.classList.remove('show');
        }
        
        function renderCategoryCheckboxes(selected) {
            const container = document.getElementById('category-checkboxes');
            let html = '';
            categories.forEach(cat => {
                const isChecked = selected.includes(cat.id);
                html += `<label class="flex items-center gap-2 px-3 py-1.5 rounded-full text-xs font-medium cursor-pointer" style="background: ${isChecked ? cat.color : '#f3f4f6'}; color: ${isChecked ? 'white' : '#6b7280'};">
                    <input type="checkbox" value="${cat.id}" ${isChecked ? 'checked' : ''} class="hidden">
                    ${cat.name}
                </label>`;
            });
            container.innerHTML = html;
            
            container.querySelectorAll('label').forEach(label => {
                label.addEventListener('click', () => {
                    const checkbox = label.querySelector('input');
                    const isChecked = checkbox.checked;
                    checkbox.checked = !isChecked;
                    label.style.background = !isChecked ? label.style.background : '#f3f4f6';
                    label.style.color = !isChecked ? 'white' : '#6b7280';
                });
            });
        }
        
        function renderIssueCheckboxes(selected) {
            const container = document.getElementById('issue-checkboxes');
            const issues = [1, 2, 3, 4, 5];
            let html = '';
            issues.forEach(issue => {
                const isChecked = selected.includes(issue);
                html += `<label class="flex items-center gap-2 px-3 py-1.5 rounded-full text-xs font-medium cursor-pointer" style="background: ${isChecked ? '#E85D75' : '#f3f4f6'}; color: ${isChecked ? 'white' : '#6b7280'};">
                    <input type="checkbox" value="${issue}" ${isChecked ? 'checked' : ''} class="hidden">
                    第${issue}期
                </label>`;
            });
            container.innerHTML = html;
            
            container.querySelectorAll('label').forEach(label => {
                label.addEventListener('click', () => {
                    const checkbox = label.querySelector('input');
                    const isChecked = checkbox.checked;
                    checkbox.checked = !isChecked;
                    label.style.background = !isChecked ? '#E85D75' : '#f3f4f6';
                    label.style.color = !isChecked ? 'white' : '#6b7280';
                });
            });
        }
        
        function handleLogoUpload() {
            const input = document.getElementById('logo-upload');
            const preview = document.getElementById('logo-preview');
            const logoData = document.getElementById('logo-data');
            const removeBtn = document.getElementById('logo-remove');
            
            input.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        logoData.value = e.target.result;
                        preview.innerHTML = `<img src="${e.target.result}" alt="Logo">`;
                        removeBtn.classList.remove('hidden');
                    };
                    reader.readAsDataURL(file);
                }
            });
        }
        
        function handleLogoRemove() {
            const preview = document.getElementById('logo-preview');
            const logoData = document.getElementById('logo-data');
            const removeBtn = document.getElementById('logo-remove');
            
            document.getElementById('logo-remove').addEventListener('click', () => {
                logoData.value = '';
                preview.innerHTML = '<i data-lucide="image" class="w-6 h-6 text-gray-400"></i>';
                removeBtn.classList.add('hidden');
                lucide.createIcons();
            });
        }
        
        function saveWebsite(e) {
            e.preventDefault();
            
            const id = document.getElementById('website-id').value || `site-${Date.now()}`;
            const name = document.getElementById('website-name').value;
            const url = document.getElementById('website-url').value;
            const summary = document.getElementById('website-summary').value;
            const description = document.getElementById('website-description').value;
            const tagsStr = document.getElementById('website-tags').value;
            const priority = parseInt(document.getElementById('website-priority').value) || 50;
            const logoData = document.getElementById('logo-data').value;
            
            const categoriesCheckboxes = document.querySelectorAll('#category-checkboxes input:checked');
            const categories = Array.from(categoriesCheckboxes).map(cb => cb.value);
            
            const issuesCheckboxes = document.querySelectorAll('#issue-checkboxes input:checked');
            const issues = Array.from(issuesCheckboxes).map(cb => parseInt(cb.value));
            
            const tags = tagsStr.split(',').map(t => t.trim()).filter(t => t);
            
            const websiteData = {
                id,
                name,
                url,
                summary,
                description,
                categories,
                tags,
                issues,
                priority,
                favicon: logoData || getFaviconUrl(url)
            };
            
            const existingIndex = state.websites.findIndex(w => w.id === id);
            if (existingIndex > -1) {
                state.websites[existingIndex] = websiteData;
            } else {
                state.websites.push(websiteData);
            }
            
            localStorage.setItem('custom_websites', JSON.stringify(state.websites.filter(w => !websites.find(ow => ow.id === w.id))));
            
            closeEditModal();
            filterAndRenderWebsites();
            renderIssueTabs();
        }
        
        function deleteWebsite() {
            const id = document.getElementById('website-id').value;
            if (id && confirm('确定要删除这个网站吗？')) {
                state.websites = state.websites.filter(w => w.id !== id);
                
                const customWebsites = JSON.parse(localStorage.getItem('custom_websites') || '[]');
                const updatedCustom = customWebsites.filter(w => w.id !== id);
                localStorage.setItem('custom_websites', JSON.stringify(updatedCustom));
                
                closeEditModal();
                filterAndRenderWebsites();
                renderIssueTabs();
            }
        }
        
        function renderWebsites(websitesToRender) {
            const container = document.getElementById('website-grid');
            const noResults = document.getElementById('no-results');
            
            if (websitesToRender.length === 0) {
                container.innerHTML = '';
                noResults.classList.remove('hidden');
                return;
            }
            
            noResults.classList.add('hidden');
            
            let html = '';
            websitesToRender.forEach((site, index) => {
                const isFavorite = state.favorites.includes(site.id);
                const staggerClass = `stagger-${(index % 8) + 1}`;
                
                html += `
                    <div class="website-card fade-in relative" style="animation-delay: ${index * 0.05}s;">
                        ${isAdmin ? `
                            <button class="edit-btn absolute top-3 right-3 z-10 p-2 bg-white rounded-lg shadow-md hover:bg-gray-50" data-id="${site.id}">
                                <i data-lucide="edit-2" class="w-4 h-4 text-soft-purple"></i>
                            </button>
                        ` : ''}
                        <a href="${site.url}" target="_blank" rel="noopener noreferrer" class="block bg-white rounded-xl p-5 hover:text-inherit">
                            <div class="flex items-start gap-4">
                                <div class="w-12 h-12 rounded-xl bg-gray-50 flex-shrink-0 overflow-hidden flex items-center justify-center">
                                    <img src="${site.favicon || getFaviconUrl(site.url)}" alt="${site.name}" class="w-8 h-8 object-contain" onerror="this.src='data:image/svg+xml,<svg xmlns=\\'http://www.w3.org/2000/svg\\' viewBox=\\'0 0 100 100\\'><rect fill=\\'%23FF9A9E\\' width=\\'100\\' height=\\'100\\' rx=\\'20\\'/><text x=\\'50\\' y=\\'65\\' font-size=\\'50\\' text-anchor=\\'middle\\' fill=\\'white\\'>?</text></svg>'">
                                </div>
                                <div class="flex-1 min-w-0">
                                    <div class="flex items-center gap-2 mb-1">
                                        <h3 class="font-semibold text-deep-navy truncate">${site.name}</h3>
                                        <button class="favorite-btn ${isFavorite ? 'text-coral' : 'text-gray-400 hover:text-coral'} transition-colors" data-id="${site.id}">
                                            <i data-lucide="heart" class="w-4 h-4 ${isFavorite ? 'fill-current' : ''}"></i>
                                        </button>
                                    </div>
                                    <p class="text-sm text-soft-purple/80 line-clamp-2 mb-3">${site.summary}</p>
                                    <div class="flex flex-wrap gap-1.5">
                                        ${site.categories.map(catId => {
                                            const cat = getCategoryInfo(catId);
                                            return `<span class="px-2 py-0.5 rounded-full text-xs font-medium" style="background: ${cat.color}15; color: ${cat.color};">${cat.name}</span>`;
                                        }).join('')}
                                    </div>
                                </div>
                            </div>
                        </a>
                    </div>
                `;
            });
            
            container.innerHTML = html;
            
            container.querySelectorAll('.favorite-btn').forEach(btn => {
                btn.addEventListener('click', (e) => toggleFavorite(btn.dataset.id, e));
            });
            
            container.querySelectorAll('.edit-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    const site = state.websites.find(w => w.id === btn.dataset.id);
                    openEditModal(site);
                });
            });
            
            lucide.createIcons();
        }
        
        function filterAndRenderWebsites() {
            const filtered = filterWebsites();
            renderWebsites(filtered);
            
            const countEl = document.getElementById('result-count');
            if (filtered.length > 0) {
                countEl.textContent = `共找到 ${filtered.length} 个网站`;
            } else {
                countEl.textContent = '';
            }
        }
        
        function initSearch() {
            const searchInput = document.getElementById('search-input');
            const clearBtn = document.getElementById('clear-search');
            
            let debounceTimer;
            searchInput.addEventListener('input', () => {
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(() => {
                    state.searchQuery = searchInput.value;
                    clearBtn.classList.toggle('hidden', !searchInput.value);
                    filterAndRenderWebsites();
                }, 200);
            });
            
            clearBtn.addEventListener('click', () => {
                searchInput.value = '';
                state.searchQuery = '';
                clearBtn.classList.add('hidden');
                filterAndRenderWebsites();
            });
        }
        
        function initNavigation() {
            const navAll = document.getElementById('nav-all');
            const navBrowse = document.getElementById('nav-browse');
            const navFavorites = document.getElementById('nav-favorites');
            
            function updateNavHighlight() {
                navAll.classList.remove('text-coral');
                navBrowse.classList.remove('text-coral');
                navFavorites.classList.remove('text-coral');
                
                if (state.currentView === 'favorites') {
                    navFavorites.classList.add('text-coral');
                } else if (state.currentView === 'browse') {
                    navBrowse.classList.add('text-coral');
                } else {
                    navAll.classList.add('text-coral');
                }
            }
            
            navAll.addEventListener('click', (e) => {
                e.preventDefault();
                state.currentView = 'all';
                state.currentCategory = 'all';
                state.currentIssue = 'all';
                state.searchQuery = '';
                document.getElementById('search-input').value = '';
                renderCategoryTags();
                renderIssueTabs();
                filterAndRenderWebsites();
                updateNavHighlight();
            });
            
            navBrowse.addEventListener('click', (e) => {
                e.preventDefault();
                state.currentView = 'browse';
                state.currentCategory = 'all';
                state.currentIssue = 'all';
                state.searchQuery = '';
                document.getElementById('search-input').value = '';
                renderCategoryTags();
                renderIssueTabs();
                filterAndRenderWebsites();
                updateNavHighlight();
                document.getElementById('websites').scrollIntoView({ behavior: 'smooth' });
            });
            
            navFavorites.addEventListener('click', (e) => {
                e.preventDefault();
                state.currentView = 'favorites';
                state.currentCategory = 'all';
                state.currentIssue = 'all';
                state.searchQuery = '';
                document.getElementById('search-input').value = '';
                renderCategoryTags();
                renderIssueTabs();
                filterAndRenderWebsites();
                updateNavHighlight();
            });
            
            updateNavHighlight();
        }
        
        function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            if (savedTheme === 'dark') {
                document.documentElement.classList.add('dark');
            }
            
            const themeBtn = document.getElementById('theme-toggle');
            themeBtn.addEventListener('click', () => {
                const isDark = document.documentElement.classList.toggle('dark');
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
                updateThemeIcon(isDark);
            });
            
            updateThemeIcon(savedTheme === 'dark');
        }
        
        function updateThemeIcon(isDark) {
            const themeBtn = document.getElementById('theme-toggle');
            themeBtn.innerHTML = isDark 
                ? '<i data-lucide="sun" class="w-5 h-5 text-soft-purple"></i>'
                : '<i data-lucide="moon" class="w-5 h-5 text-soft-purple"></i>';
            lucide.createIcons();
        }
        
        function initAdmin() {
            const adminToggle = document.getElementById('admin-toggle');
            const adminModal = document.getElementById('admin-modal');
            const adminModalClose = document.getElementById('admin-modal-close');
            const adminForm = document.getElementById('admin-form');
            const adminError = document.getElementById('admin-error');
            
            const savedAdmin = localStorage.getItem('isAdmin');
            if (savedAdmin === 'true') {
                isAdmin = true;
            }
            
            adminToggle.addEventListener('click', () => {
                if (isAdmin) {
                    openEditModal();
                } else {
                    adminModal.classList.add('show');
                }
            });
            
            adminModalClose.addEventListener('click', () => {
                adminModal.classList.remove('show');
                adminError.classList.add('hidden');
            });
            
            adminForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const password = document.getElementById('admin-password').value;
                if (password === ADMIN_PASSWORD) {
                    isAdmin = true;
                    localStorage.setItem('isAdmin', 'true');
                    adminModal.classList.remove('show');
                    adminToggle.classList.remove('hidden');
                    adminError.classList.add('hidden');
                    document.getElementById('admin-password').value = '';
                    filterAndRenderWebsites();
                } else {
                    adminError.classList.remove('hidden');
                }
            });
            
            document.getElementById('modal-close').addEventListener('click', closeEditModal);
            document.getElementById('edit-modal').addEventListener('click', (e) => {
                if (e.target.id === 'edit-modal') closeEditModal();
            });
            
            document.getElementById('logo-btn').addEventListener('click', () => {
                document.getElementById('logo-upload').click();
            });
            
            document.getElementById('website-form').addEventListener('submit', saveWebsite);
            document.getElementById('delete-btn').addEventListener('click', deleteWebsite);
            
            handleLogoUpload();
            handleLogoRemove();
        }
        
        function initLoading() {
            const loadingBar = document.querySelector('.loading-progress');
            const loadingScreen = document.getElementById('loading-screen');
            
            setTimeout(() => {
                loadingScreen.classList.add('hidden');
            }, 2000);
        }
        
        function loadCustomWebsites() {
            const customWebsites = JSON.parse(localStorage.getItem('custom_websites') || '[]');
            customWebsites.forEach(site => {
                if (!state.websites.find(w => w.id === site.id)) {
                    state.websites.push(site);
                }
            });
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            initTheme();
            loadCustomWebsites();
            renderIssueTabs();
            renderCategoryTags();
            filterAndRenderWebsites();
            initSearch();
            initNavigation();
            initAdmin();
            initLoading();
        });
    </script>
    
    <!-- 编辑器样式和脚本 -->
    <link rel="stylesheet" href="../editor.css">
    <script src="../editor.js"></script>
</body>
</html>
