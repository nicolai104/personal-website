<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>摄影集 | NicoSun Lab - 记录光影瞬间</title>
    <meta name="description" content="摄影作品展示，记录生活中的美好瞬间">
    
    <!-- Open Graph 社交分享标签 -->
    <meta property="og:title" content="摄影集 | NicoSun Lab">
    <meta property="og:description" content="记录光影瞬间，发现生活中的美">
    <meta property="og:type" content="website">
    
    <!-- 字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS 样式库 -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- GSAP 动画库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    
    <!-- Lucide 图标库 -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Space Grotesk', 'Noto Sans SC', 'sans-serif'],
                    },
                    colors: {
                        cream: '#FDF8F3',
                        'deep-navy': '#1A1A2E',
                        'soft-purple': '#4A4A68',
                        coral: '#E85D75',
                        'mint': '#A8EDEA',
                        'peach': '#FECFEF',
                    }
                }
            }
        }
    </script>
    
    <style>
        :root {
            --cream: #FDF8F3;
            --deep-navy: #1A1A2E;
            --soft-purple: #4A4A68;
            --coral: #E85D75;
            --mint: #A8EDEA;
            --peach: #FECFEF;
            --bg-primary: #FDF8F3;
            --bg-secondary: #ffffff;
            --text-primary: #1A1A2E;
            --text-secondary: #4A4A68;
            --card-bg: #ffffff;
            --border-color: rgba(26, 26, 46, 0.1);
            --glass-bg: rgba(253, 248, 243, 0.8);
            --gradient-1: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --gradient-2: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --gradient-3: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            --gradient-4: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            --gradient-5: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            --gradient-6: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
        }
        
        [data-theme="dark"] {
            --cream: #0D1117;
            --deep-navy: #1A1A2E;
            --soft-purple: #4A4A68;
            --coral: #FF9A9E;
            --mint: #A8EDEA;
            --peach: #FECFEF;
            --bg-primary: #0D1117;
            --bg-secondary: #1A1A2E;
            --text-primary: #E8E8E8;
            --text-secondary: #A0A0A0;
            --card-bg: #1A1A2E;
            --border-color: rgba(255, 255, 255, 0.1);
            --glass-bg: rgba(13, 17, 23, 0.85);
            --gradient-1: linear-gradient(135deg, #5a5a7a 0%, #6b6b8a 100%);
            --gradient-2: linear-gradient(135deg, #c0c0c0 0%, #d0d0d0 100%);
            --gradient-3: linear-gradient(135deg, #3a3a4a 0%, #4a4a5a 100%);
            --gradient-4: linear-gradient(135deg, #7a7a7a 0%, #9a9a9a 100%);
            --gradient-5: linear-gradient(135deg, #8a8a8a 0%, #a8a8a8a 100%);
            --gradient-6: linear-gradient(135deg, #a0a0a0 0%, #d0b0b0 100%);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html {
            scroll-behavior: smooth;
        }
        
        body {
            font-family: 'Space Grotesk', 'Noto Sans SC', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            overflow-x: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }
        
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #FF9A9E, #FECFEF);
            border-radius: 4px;
        }
        
        /* Gradient Text */
        .gradient-text {
            background: var(--gradient-6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        /* Glass Effect */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        
        /* Link Underline Animation */
        .nav-link {
            position: relative;
        }
        
        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 50%;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #FF9A9E, #FECFEF);
            transition: all 0.3s ease;
            transform: translateX(-50%);
        }
        
        .nav-link:hover::after {
            width: 100%;
        }
        
        /* Button Styles */
        .btn-primary {
            background: linear-gradient(135deg, #FF9A9E 0%, #FECFEF 100%);
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 154, 158, 0.4);
        }
        
        /* Reveal Animation */
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }
        
        /* ========================================
           横向瀑布流照片展示 (Photo Waterfall)
           ======================================== */
        
        /* 照片瀑布流容器 */
        .photo-waterfall-container {
            width: 100%;
            overflow: hidden;
            position: relative;
        }
        
        /* 照片瀑布流 - 使用 flexbox 实现横向排列 */
        .photo-waterfall {
            display: flex;
            gap: 20px;
            animation: scrollPhotos 25s linear infinite;
            padding: 20px 0;
        }
        
        /* 悬停时暂停动画 */
        .photo-waterfall-container:hover .photo-waterfall {
            animation-play-state: paused;
        }
        
        /* 无限循环滚动动画 */
        @keyframes scrollPhotos {
            0% {
                transform: translateX(0);
            }
            100% {
                transform: translateX(-50%);
            }
        }
        
        /* 照片卡片样式 */
        .photo-card {
            flex-shrink: 0;
            width: 280px;
            height: 400px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(26, 26, 46, 0.1);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            will-change: transform;
            transform: translate3d(0, 0, 0);
            contain: layout style paint;
        }
        
        .photo-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 50px rgba(26, 26, 46, 0.2);
            z-index: 10;
        }
        
        /* 照片图片 */
        .photo-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .photo-card:hover img {
            transform: scale(1.1);
        }
        
        /* 照片覆盖层 */
        .photo-card-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(26, 26, 46, 0.8) 0%, rgba(26, 26, 46, 0.4) 50%, transparent 100%);
            opacity: 0;
            transition: opacity 0.4s ease;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 20px;
        }
        
        .photo-card:hover .photo-card-overlay {
            opacity: 1;
        }
        
        /* 照片信息 */
        .photo-info {
            color: white;
            transform: translateY(20px);
            transition: transform 0.4s ease;
        }
        
        .photo-card:hover .photo-info {
            transform: translateY(0);
        }
        
        .photo-info h4 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .photo-info p {
            font-size: 0.85rem;
            opacity: 0.8;
        }
        
        /* 响应式设计 */
        @media (max-width: 1024px) {
            .photo-card {
                width: 240px;
                height: 340px;
            }
            
            .photo-waterfall {
                gap: 16px;
            }
        }
        
        @media (max-width: 768px) {
            .photo-card {
                width: 200px;
                height: 280px;
            }
            
            .photo-waterfall {
                gap: 12px;
                animation-duration: 20s;
            }
        }
        
        @media (max-width: 480px) {
            .photo-card {
                width: 160px;
                height: 220px;
            }
            
            .photo-waterfall {
                gap: 10px;
                animation-duration: 15s;
            }
        }
        
        /* Theme Toggle Button */
        .theme-toggle {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            background: linear-gradient(135deg, #FF9A9E 0%, #FECFEF 100%);
            color: white;
            border-radius: 50px;
            font-weight: 500;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 154, 158, 0.3);
        }
        
        .theme-toggle:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 154, 158, 0.4);
        }
        
        /* Lightbox */
        .lightbox {
            position: fixed;
            inset: 0;
            background: rgba(26, 26, 46, 0.95);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s ease;
        }
        
        .lightbox.active {
            opacity: 1;
            visibility: visible;
        }
        
        .lightbox-content {
            position: relative;
            max-width: 90vw;
            max-height: 90vh;
        }
        
        .lightbox-content img {
            max-width: 100%;
            max-height: 90vh;
            border-radius: 12px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }
        
        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 44px;
            height: 44px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            color: var(--deep-navy);
        }
        
        .lightbox-close:hover {
            background: var(--coral);
            color: white;
            transform: rotate(90deg);
        }
        
        /* Reduced Motion */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body class="antialiased">
    <!-- 导航栏 -->
    <nav class="fixed top-0 left-0 right-0 z-50 glass">
        <div class="max-w-7xl mx-auto px-6 lg:px-8">
            <div class="flex items-center justify-between h-20">
                <a href="index.html" class="text-2xl font-bold gradient-text">NicoSun Lab</a>
                
                <div class="flex items-center gap-4">
                    <button id="theme-toggle" class="theme-toggle">
                        <i data-lucide="moon" class="w-5 h-5 theme-icon-light"></i>
                        <i data-lucide="sun" class="w-5 h-5 theme-icon-dark hidden"></i>
                        <span class="theme-text">深色模式</span>
                    </button>
                    <a href="index.html" class="btn-primary px-6 py-2.5 rounded-full text-white font-medium inline-flex items-center gap-2">
                        <i data-lucide="arrow-left" class="w-4 h-4"></i>
                        返回首页
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- 页面标题区域 -->
    <section class="pt-32 pb-16">
        <div class="max-w-7xl mx-auto px-6 lg:px-8">
            <div class="text-center reveal">
                <span class="inline-block px-4 py-1.5 rounded-full text-sm font-medium bg-gradient-to-r from-pink-100 to-purple-100 text-pink-600 mb-6">
                    Photography
                </span>
                <h1 class="text-4xl md:text-6xl font-bold mb-6">
                    摄影集 <span class="gradient-text">|</span> 记录光影瞬间
                </h1>
                <p class="text-soft-purple/70 text-lg max-w-2xl mx-auto">
                    用镜头捕捉生活中的美好时刻，每一张照片都是一个故事
                </p>
            </div>
        </div>
    </section>

    <!-- 横向瀑布流照片展示 -->
    <section class="py-24 bg-white/50 overflow-hidden">
        <div class="max-w-7xl mx-auto px-6 lg:px-8">
            <div class="photo-waterfall-container reveal">
                <div class="photo-waterfall" id="photo-waterfall">
                    <!-- 照片将通过JavaScript动态加载 -->
                </div>
            </div>
        </div>
    </section>

    <!-- Lightbox 查看器 -->
    <div class="lightbox" id="lightbox">
        <div class="lightbox-content">
            <img src="" alt="" id="lightboxImage">
            <div class="lightbox-close" onclick="closeLightbox()">
                <i data-lucide="x" class="w-6 h-6"></i>
            </div>
        </div>
    </div>

    <!-- 底部返回 -->
    <section class="py-16 bg-white/50">
        <div class="max-w-7xl mx-auto px-6 lg:px-8 text-center">
            <a href="index.html" class="btn-primary px-8 py-3 rounded-full text-white font-medium inline-flex items-center gap-2">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
                返回首页
            </a>
        </div>
    </section>

    <!-- JavaScript 脚本 -->
    <script>
        // 主题切换功能
        function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            updateThemeIcons(savedTheme);
        }
        
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeIcons(newTheme);
        }
        
        function updateThemeIcons(theme) {
            const lightIcon = document.querySelector('.theme-icon-light');
            const darkIcon = document.querySelector('.theme-icon-dark');
            const themeText = document.querySelector('.theme-text');
            
            if (theme === 'dark') {
                lightIcon.classList.add('hidden');
                darkIcon.classList.remove('hidden');
                themeText.textContent = '浅色模式';
            } else {
                lightIcon.classList.remove('hidden');
                darkIcon.classList.add('hidden');
                themeText.textContent = '深色模式';
            }
        }
        
        // 初始化主题
        initTheme();
        
        // 绑定主题切换按钮事件
        document.getElementById('theme-toggle').addEventListener('click', toggleTheme);
        
        // 初始化 Lucide 图标
        lucide.createIcons();
        
        // 滚动显示动画
        const revealElements = document.querySelectorAll('.reveal');
        
        const revealOnScroll = () => {
            revealElements.forEach((element, index) => {
                setTimeout(() => {
                    element.classList.add('active');
                }, index * 100);
            });
        };
        
        // 页面加载时执行动画
        window.addEventListener('load', revealOnScroll);
        
        // ========================================
        // 摄影作品瀑布流动态加载
        // ========================================
        
        function initPhotoWaterfall() {
            const photoWaterfall = document.getElementById('photo-waterfall');
            if (!photoWaterfall) return;
            
            const totalPhotos = 41;
            const photos = [];
            
            for (let i = 1; i <= totalPhotos; i++) {
                photos.push({
                    id: i,
                    src: `images/photos/${i}.jpg`,
                    srcAlt: `images/photos/${i}.JPG`,
                    title: `照片 ${i}`,
                    description: `摄影作品 #${i}`
                });
            }
            
            function createPhotoCard(photo) {
                const card = document.createElement('div');
                card.className = 'photo-card';
                
                const img = document.createElement('img');
                img.src = photo.src;
                img.alt = photo.title;
                img.loading = 'lazy';
                
                img.onerror = function() {
                    this.src = photo.srcAlt;
                };
                
                const overlay = document.createElement('div');
                overlay.className = 'photo-card-overlay';
                overlay.innerHTML = `
                    <div class="photo-info">
                        <h4>${photo.title}</h4>
                        <p>${photo.description}</p>
                    </div>
                `;
                
                card.appendChild(img);
                card.appendChild(overlay);
                
                card.addEventListener('click', () => openLightbox(photo.srcAlt || photo.src));
                
                return card;
            }
            
            function loadPhotos() {
                photoWaterfall.innerHTML = '';
                
                const photosToLoad = [...photos, ...photos];
                
                photosToLoad.forEach(photo => {
                    const card = createPhotoCard(photo);
                    photoWaterfall.appendChild(card);
                });
            }
            
            loadPhotos();
        }
        
        // 初始化照片瀑布流
        initPhotoWaterfall();
        
        // Lightbox 功能
        const lightbox = document.getElementById('lightbox');
        const lightboxImage = document.getElementById('lightboxImage');
        
        function openLightbox(src) {
            lightboxImage.src = src;
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        
        function closeLightbox() {
            lightbox.classList.remove('active');
            document.body.style.overflow = '';
        }
        
        // 点击背景关闭 Lightbox
        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox) {
                closeLightbox();
            }
        });
        
        // 键盘导航
        document.addEventListener('keydown', (e) => {
            if (!lightbox.classList.contains('active')) return;
            
            if (e.key === 'Escape') closeLightbox();
        });
    </script>
</body>
</html>
