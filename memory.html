<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>记忆翻牌 | NicoSun Lab - 挑战记忆力</title>
    <meta name="description" content="记忆翻牌游戏，挑战你的记忆力极限">
    
    <!-- Open Graph 社交分享标签 -->
    <meta property="og:title" content="记忆翻牌 | NicoSun Lab">
    <meta property="og:description" content="挑战你的记忆力，找出所有配对">
    <meta property="og:type" content="website">
    
    <!-- 字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS 样式库 -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- GSAP 动画库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <!-- Lucide 图标库 -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Space Grotesk', 'Noto Sans SC', 'sans-serif'],
                    },
                    colors: {
                        cream: '#FDF8F3',
                        'deep-navy': '#1A1A2E',
                        'soft-purple': '#4A4A68',
                        coral: '#E85D75',
                        'mint': '#A8EDEA',
                        'peach': '#FECFEF',
                    }
                }
            }
        }
    </script>
    
    <style>
        :root {
            --cream: #FDF8F3;
            --deep-navy: #1A1A2E;
            --soft-purple: #4A4A68;
            --coral: #E85D75;
            --mint: #A8EDEA;
            --peach: #FECFEF;
            --bg-primary: #FDF8F3;
            --bg-secondary: #ffffff;
            --text-primary: #1A1A2E;
            --text-secondary: #4A4A68;
            --card-bg: #ffffff;
            --border-color: rgba(26, 26, 46, 0.1);
            --glass-bg: rgba(253, 248, 243, 0.8);
            --gradient-1: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --gradient-2: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --gradient-3: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            --gradient-4: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            --gradient-5: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            --gradient-6: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
        }
        
        [data-theme="dark"] {
            --cream: #0D1117;
            --deep-navy: #1A1A2E;
            --soft-purple: #4A4A68;
            --coral: #FF9A9E;
            --mint: #A8EDEA;
            --peach: #FECFEF;
            --bg-primary: #0D1117;
            --bg-secondary: #1A1A2E;
            --text-primary: #E8E8E8;
            --text-secondary: #A0A0A0;
            --card-bg: #1A1A2E;
            --border-color: rgba(255, 255, 255, 0.1);
            --glass-bg: rgba(13, 17, 23, 0.85);
            --gradient-1: linear-gradient(135deg, #5a5a7a 0%, #6b6b8a 100%);
            --gradient-2: linear-gradient(135deg, #c0c0c0 0%, #d0d0d0 100%);
            --gradient-3: linear-gradient(135deg, #3a3a4a 0%, #4a4a5a 100%);
            --gradient-4: linear-gradient(135deg, #7a7a7a 0%, #9a9a9a 100%);
            --gradient-5: linear-gradient(135deg, #8a8a8a 0%, #a8a8a8a 100%);
            --gradient-6: linear-gradient(135deg, #a0a0a0 0%, #d0b0b0 100%);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html {
            scroll-behavior: smooth;
        }
        
        body {
            font-family: 'Space Grotesk', 'Noto Sans SC', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            overflow-x: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }
        
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #FF9A9E, #FECFEF);
            border-radius: 4px;
        }
        
        /* Gradient Text */
        .gradient-text {
            background: var(--gradient-6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        /* Glass Effect */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        
        /* Back Button */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            background: linear-gradient(135deg, #FF9A9E 0%, #FECFEF 100%);
            color: white;
            border-radius: 50px;
            font-weight: 500;
            transition: all 0.3s ease;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(255, 154, 158, 0.3);
        }
        
        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 154, 158, 0.4);
        }
        
        /* Theme Toggle Button */
        .theme-toggle {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            background: linear-gradient(135deg, #FF9A9E 0%, #FECFEF 100%);
            color: white;
            border-radius: 50px;
            font-weight: 500;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 154, 158, 0.3);
        }
        
        .theme-toggle:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 154, 158, 0.4);
        }
        
        /* Game Container */
        .game-container {
            background: white;
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(26, 26, 46, 0.1);
        }
        
        @media (max-width: 768px) {
            .game-container {
                padding: 24px;
            }
        }
        
        /* Game Stats */
        .game-stats {
            display: flex;
            gap: 24px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .stat-box {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            padding: 16px 32px;
            border-radius: 16px;
            text-align: center;
            min-width: 120px;
        }
        
        .stat-label {
            font-size: 0.85rem;
            color: var(--soft-purple);
            margin-bottom: 4px;
        }
        
        .stat-value {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--deep-navy);
        }
        
        /* Game Buttons */
        .game-btn {
            padding: 14px 32px;
            border-radius: 50px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
        }
        
        .game-btn-primary {
            background: linear-gradient(135deg, #FF9A9E 0%, #FECFEF 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 154, 158, 0.3);
        }
        
        .game-btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 154, 158, 0.4);
        }
        
        /* Memory Game */
        .memory-game {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            max-width: 500px;
            margin: 0 auto;
        }
        
        @media (max-width: 600px) {
            .memory-game {
                grid-template-columns: repeat(4, 1fr);
                gap: 10px;
            }
        }
        
        .memory-card {
            aspect-ratio: 1;
            background: linear-gradient(135deg, #FF9A9E 0%, #FECFEF 100%);
            border-radius: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            transition: all 0.3s ease;
            position: relative;
            transform-style: preserve-3d;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        
        @media (max-width: 600px) {
            .memory-card {
                font-size: 1.75rem;
                border-radius: 12px;
            }
        }
        
        .memory-card:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(255, 154, 158, 0.4);
        }
        
        .memory-card.flipped {
            background: white;
            border: 3px solid #FF9A9E;
        }
        
        .memory-card.matched {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            border: 3px solid #38f9d7;
            animation: matchPulse 0.5s ease;
        }
        
        @keyframes matchPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        .memory-card .card-content {
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .memory-card.flipped .card-content,
        .memory-card.matched .card-content {
            opacity: 1;
        }
        
        .memory-card::before {
            content: '?';
            position: absolute;
            font-size: 2rem;
            color: white;
            font-weight: bold;
            opacity: 1;
            transition: opacity 0.3s ease;
        }
        
        .memory-card.flipped::before,
        .memory-card.matched::before {
            opacity: 0;
        }
        
        /* Reveal Animation */
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }
        
        /* Victory Modal */
        .victory-modal {
            position: fixed;
            inset: 0;
            background: rgba(26, 26, 46, 0.9);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s ease;
        }
        
        .victory-modal.active {
            opacity: 1;
            visibility: visible;
        }
        
        .victory-content {
            background: white;
            padding: 50px;
            border-radius: 30px;
            text-align: center;
            max-width: 400px;
            transform: scale(0.8);
            transition: transform 0.4s ease;
        }
        
        .victory-modal.active .victory-content {
            transform: scale(1);
        }
        
        .victory-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            color: white;
        }
    </style>
</head>
<body class="antialiased">
    <!-- 导航栏 -->
    <nav class="fixed top-0 left-0 right-0 z-50 glass">
        <div class="max-w-7xl mx-auto px-6 lg:px-8">
            <div class="flex items-center justify-between h-20">
                <a href="index.html" class="text-2xl font-bold gradient-text">NicoSun Lab</a>
                <div class="flex items-center gap-4">
                    <button id="theme-toggle" class="theme-toggle">
                        <i data-lucide="moon" class="w-5 h-5 theme-icon-light"></i>
                        <i data-lucide="sun" class="w-5 h-5 theme-icon-dark hidden"></i>
                        <span class="theme-text">深色模式</span>
                    </button>
                    <a href="games.html" class="back-btn">
                        <i data-lucide="gamepad-2" class="w-5 h-5"></i>
                        游戏大厅
                    </a>
                    <a href="index.html" class="back-btn">
                        <i data-lucide="arrow-left" class="w-5 h-5"></i>
                        返回首页
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- 页面标题区域 -->
    <section class="pt-32 pb-16">
        <div class="max-w-7xl mx-auto px-6 lg:px-8">
            <div class="text-center reveal">
                <span class="inline-block px-4 py-1.5 rounded-full text-sm font-medium bg-gradient-to-r from-pink-100 to-purple-100 text-pink-600 mb-6">
                    Memory Game
                </span>
                <h1 class="text-4xl md:text-6xl font-bold mb-6">
                    记忆翻牌 <span class="gradient-text">|</span> 挑战记忆力
                </h1>
                <p class="text-soft-purple/70 text-lg max-w-2xl mx-auto">
                    翻开卡片，找出相同的配对。考验你的记忆力和专注力！
                </p>
            </div>
        </div>
    </section>

    <!-- 游戏区域 -->
    <section class="pb-24">
        <div class="max-w-4xl mx-auto px-6 lg:px-8">
            <div class="game-container reveal">
                <div class="game-stats">
                    <div class="stat-box">
                        <div class="stat-label">步数</div>
                        <div class="stat-value" id="memoryMoves">0</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">时间</div>
                        <div class="stat-value" id="memoryTime">00:00</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">配对</div>
                        <div class="stat-value" id="memoryPairs">0/8</div>
                    </div>
                </div>
                
                <div class="memory-game" id="memoryGame">
                    <!-- 卡片将通过 JavaScript 生成 -->
                </div>
                
                <div class="text-center mt-8">
                    <button class="game-btn game-btn-primary" onclick="initMemoryGame()">
                        <i data-lucide="refresh-cw" class="inline w-5 h-5 mr-2"></i>
                        重新开始
                    </button>
                </div>
            </div>
        </div>
    </section>

    <!-- 胜利弹窗 -->
    <div class="victory-modal" id="victoryModal">
        <div class="victory-content">
            <div class="victory-icon">
                <i data-lucide="trophy" class="w-12 h-12"></i>
            </div>
            <h2 class="text-2xl font-bold mb-2">恭喜你！</h2>
            <p class="text-soft-purple mb-6" id="victoryMessage">完成挑战</p>
            <button class="game-btn game-btn-primary" onclick="closeVictoryModal()">
                再玩一次
            </button>
        </div>
    </div>

    <!-- 底部返回 -->
    <section class="py-16 bg-white/50">
        <div class="max-w-7xl mx-auto px-6 lg:px-8 text-center">
            <a href="games.html" class="back-btn">
                <i data-lucide="gamepad-2" class="w-5 h-5"></i>
                返回游戏大厅
            </a>
        </div>
    </section>

    <script>
        // 主题切换功能
        function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            updateThemeIcons(savedTheme);
        }
        
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeIcons(newTheme);
        }
        
        function updateThemeIcons(theme) {
            const lightIcon = document.querySelector('.theme-icon-light');
            const darkIcon = document.querySelector('.theme-icon-dark');
            const themeText = document.querySelector('.theme-text');
            
            if (theme === 'dark') {
                lightIcon.classList.add('hidden');
                darkIcon.classList.remove('hidden');
                themeText.textContent = '浅色模式';
            } else {
                lightIcon.classList.remove('hidden');
                darkIcon.classList.add('hidden');
                themeText.textContent = '深色模式';
            }
        }
        
        // 初始化主题
        initTheme();
        
        // 绑定主题切换按钮事件
        document.getElementById('theme-toggle').addEventListener('click', toggleTheme);
        
        // 初始化 Lucide 图标
        lucide.createIcons();

        // 滚动显示动画
        const revealElements = document.querySelectorAll('.reveal');
        
        const revealOnScroll = () => {
            revealElements.forEach((element, index) => {
                setTimeout(() => {
                    element.classList.add('active');
                }, index * 100);
            });
        };

        window.addEventListener('load', revealOnScroll);

        // 记忆翻牌游戏逻辑
        const emojis = ['🎨', '🎮', '🎭', '🎪', '🎯', '🎲', '🎸', '🎺'];
        let memoryCards = [];
        let flippedCards = [];
        let matchedPairs = 0;
        let moves = 0;
        let gameTimer = null;
        let seconds = 0;
        let isLocked = false;

        function initMemoryGame() {
            const gameContainer = document.getElementById('memoryGame');
            gameContainer.innerHTML = '';
            
            // 重置游戏状态
            memoryCards = [...emojis, ...emojis];
            flippedCards = [];
            matchedPairs = 0;
            moves = 0;
            seconds = 0;
            isLocked = false;
            
            // 更新显示
            updateMemoryStats();
            
            // 停止计时器
            if (gameTimer) {
                clearInterval(gameTimer);
                gameTimer = null;
            }
            
            // 打乱卡片
            memoryCards.sort(() => Math.random() - 0.5);
            
            // 创建卡片
            memoryCards.forEach((emoji, index) => {
                const card = document.createElement('div');
                card.className = 'memory-card';
                card.dataset.index = index;
                card.dataset.emoji = emoji;
                card.innerHTML = `<span class="card-content">${emoji}</span>`;
                card.addEventListener('click', () => flipCard(card));
                gameContainer.appendChild(card);
            });
            
            // 开始计时
            gameTimer = setInterval(() => {
                seconds++;
                updateMemoryStats();
            }, 1000);
        }

        function flipCard(card) {
            if (isLocked || card.classList.contains('flipped') || card.classList.contains('matched')) {
                return;
            }
            
            card.classList.add('flipped');
            flippedCards.push(card);
            
            if (flippedCards.length === 2) {
                moves++;
                updateMemoryStats();
                checkMatch();
            }
        }

        function checkMatch() {
            isLocked = true;
            const [card1, card2] = flippedCards;
            
            if (card1.dataset.emoji === card2.dataset.emoji) {
                setTimeout(() => {
                    card1.classList.add('matched');
                    card2.classList.add('matched');
                    matchedPairs++;
                    updateMemoryStats();
                    flippedCards = [];
                    isLocked = false;
                    
                    // 检查胜利
                    if (matchedPairs === emojis.length) {
                        clearInterval(gameTimer);
                        setTimeout(() => {
                            showVictory(`太棒了！你用了 ${moves} 步，耗时 ${formatTime(seconds)}`);
                        }, 500);
                    }
                }, 500);
            } else {
                setTimeout(() => {
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    flippedCards = [];
                    isLocked = false;
                }, 1000);
            }
        }

        function updateMemoryStats() {
            document.getElementById('memoryMoves').textContent = moves;
            document.getElementById('memoryTime').textContent = formatTime(seconds);
            document.getElementById('memoryPairs').textContent = `${matchedPairs}/${emojis.length}`;
        }

        function formatTime(totalSeconds) {
            const mins = Math.floor(totalSeconds / 60).toString().padStart(2, '0');
            const secs = (totalSeconds % 60).toString().padStart(2, '0');
            return `${mins}:${secs}`;
        }

        function showVictory(message) {
            document.getElementById('victoryMessage').textContent = message;
            document.getElementById('victoryModal').classList.add('active');
        }

        function closeVictoryModal() {
            document.getElementById('victoryModal').classList.remove('active');
            initMemoryGame();
        }

        // 点击背景关闭弹窗
        document.getElementById('victoryModal').addEventListener('click', (e) => {
            if (e.target.id === 'victoryModal') {
                closeVictoryModal();
            }
        });

        // 初始化游戏
        initMemoryGame();
    </script>
</body>
</html>
